<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASTRA · Agent Logs</title>
<meta name="description" content="Browse the full multi-agent execution transcripts (deep research, synthesis, critique) behind ASTRA's prebiotic reaction-network reconstructions — per molecule, model, and configuration.">
<link rel="icon" href="../demo/imgs/astra_logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Markdown renderer (also used elsewhere in the repo). Loaded eagerly so marked.parse exists at first render. -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    --bg0:#0A0E1A; --bg1:#0B1020; --panel:#121829; --panel2:#0E1422;
    --border:#243049; --border2:#33415e;
    --text:#E6ECF7; --muted:#8FA0BD; --dim:#5d6b86;
    --astra:#7C8CF8; --gold:#FCD34D; --teal:#2DD4BF;
    /* JSON syntax tokens (from demo/index.html) */
    --j-key:#7DD3FC; --j-str:#86EFAC; --j-num:#FCD34D; --j-bool:#F0ABFC; --j-punct:#8295b5;
    --good:#34D399; --bad:#F87171;
  }
  *{box-sizing:border-box}
  html,body{min-height:100%}
  body{
    margin:0; min-height:100vh;
    font-family:'Source Sans 3','Helvetica Neue',sans-serif;
    color:var(--text);
    background:radial-gradient(1200px 700px at 50% 18%, #131a30 0%, var(--bg1) 45%, var(--bg0) 100%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* ---------- animated sky (behind everything) ---------- */
  .sky{position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;}
  .glow{position:absolute; border-radius:50%; filter:blur(24px);}
  .glow-a{width:720px; height:720px; left:-180px; top:-200px;
    background:radial-gradient(circle, rgba(124,140,248,.22), transparent 62%);
    animation:drift 24s ease-in-out infinite;}
  .glow-b{width:640px; height:640px; right:-180px; bottom:-220px;
    background:radial-gradient(circle, rgba(45,212,191,.14), transparent 62%);
    animation:drift 30s ease-in-out infinite reverse;}
  .stars{position:absolute; top:0; left:0; width:2px; height:2px; border-radius:50%;
    background:transparent; animation:twinkle 5.5s ease-in-out infinite;
    box-shadow:
      40px 60px rgba(224,231,255,.6), 130px 200px rgba(224,231,255,.55), 210px 90px rgba(224,231,255,.6),
      300px 320px rgba(224,231,255,.5), 380px 150px rgba(224,231,255,.6), 470px 40px rgba(224,231,255,.55),
      540px 260px rgba(224,231,255,.5), 620px 120px rgba(224,231,255,.6), 700px 350px rgba(224,231,255,.5),
      790px 200px rgba(224,231,255,.55), 860px 70px rgba(224,231,255,.6), 950px 300px rgba(224,231,255,.5),
      1030px 160px rgba(224,231,255,.55), 1120px 380px rgba(224,231,255,.5), 1200px 90px rgba(224,231,255,.6),
      1290px 250px rgba(224,231,255,.5), 1370px 130px rgba(224,231,255,.55), 1450px 330px rgba(224,231,255,.5),
      90px 400px rgba(224,231,255,.55), 260px 470px rgba(224,231,255,.5), 430px 520px rgba(224,231,255,.55),
      600px 440px rgba(224,231,255,.5), 760px 500px rgba(224,231,255,.55), 930px 460px rgba(224,231,255,.5),
      1100px 520px rgba(224,231,255,.55), 1270px 430px rgba(224,231,255,.5), 1420px 500px rgba(224,231,255,.55),
      160px 640px rgba(224,231,255,.5), 350px 700px rgba(224,231,255,.55), 520px 660px rgba(224,231,255,.5),
      690px 720px rgba(224,231,255,.55), 880px 680px rgba(224,231,255,.5), 1050px 730px rgba(224,231,255,.55),
      1230px 660px rgba(224,231,255,.5), 1400px 710px rgba(224,231,255,.55), 70px 820px rgba(224,231,255,.5),
      300px 860px rgba(224,231,255,.55), 560px 830px rgba(224,231,255,.5), 820px 880px rgba(224,231,255,.55),
      1080px 840px rgba(224,231,255,.5), 1340px 870px rgba(224,231,255,.55);}
  .stars2{animation:twinkle2 7.5s ease-in-out infinite; animation-delay:-2s;
    box-shadow:
      100px 120px 1px rgba(255,255,255,.9), 320px 250px 1px rgba(124,140,248,.9), 560px 100px 1px rgba(255,255,255,.9),
      780px 300px 1px rgba(255,255,255,.85), 1010px 180px 1px rgba(124,140,248,.85), 1250px 320px 1px rgba(255,255,255,.9),
      1440px 140px 1px rgba(255,255,255,.85), 200px 560px 1px rgba(255,255,255,.9), 480px 620px 1px rgba(124,140,248,.85),
      740px 560px 1px rgba(255,255,255,.9), 1000px 640px 1px rgba(255,255,255,.85), 1300px 580px 1px rgba(45,212,191,.8),
      150px 760px 1px rgba(255,255,255,.9), 460px 800px 1px rgba(255,255,255,.85), 720px 760px 1px rgba(124,140,248,.85),
      1020px 820px 1px rgba(255,255,255,.9), 1320px 780px 1px rgba(255,255,255,.85), 620px 400px 1px rgba(255,255,255,.9),
      900px 420px 1px rgba(45,212,191,.8), 1180px 460px 1px rgba(255,255,255,.9);}
  @keyframes twinkle{0%,100%{opacity:.35}50%{opacity:.85}}
  @keyframes twinkle2{0%,100%{opacity:.55}50%{opacity:1}}
  @keyframes drift{0%{transform:translate(0,0)}50%{transform:translate(34px,-22px)}100%{transform:translate(0,0)}}

  /* ---------- top nav ---------- */
  .nav{position:relative; z-index:6;
    display:flex; align-items:center; justify-content:space-between; gap:20px;
    padding:14px 34px; border-bottom:1px solid var(--border);
    background:rgba(10,14,26,.55); backdrop-filter:blur(9px); -webkit-backdrop-filter:blur(9px);}
  .brand{display:flex; align-items:center; text-decoration:none;}
  .brand img{height:38px; width:auto; filter:drop-shadow(0 0 14px rgba(124,140,248,.45));}
  .menu{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .menu a{color:var(--muted); text-decoration:none; font-weight:600; font-size:15px;
    padding:8px 14px; border-radius:10px; transition:color .2s, background .2s;}
  .menu a:hover{color:var(--text); background:rgba(124,140,248,.12);}
  .menu a.active{color:var(--text); background:rgba(124,140,248,.14);}
  .menu a.cta{color:#0b1020; background:linear-gradient(180deg,#93a0ff,var(--astra));
    box-shadow:0 4px 18px rgba(124,140,248,.4); margin-left:6px;}
  .menu a.cta:hover{filter:brightness(1.06); color:#0b1020; background:linear-gradient(180deg,#93a0ff,var(--astra));}

  /* ---------- toolbar (selectors) ---------- */
  #toolbar{position:sticky; top:0; z-index:5;
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    padding:12px 22px; border-bottom:1px solid var(--border);
    background:rgba(10,14,26,.78); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);}
  #page-title{font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700;
    letter-spacing:1.5px; text-transform:uppercase; color:var(--astra);}
  .toolbar-sep{width:1px; height:22px; background:var(--border2);}
  .select-group{display:flex; align-items:center; gap:7px;}
  .select-label{font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:1px;
    text-transform:uppercase; color:var(--dim); white-space:nowrap;}
  #toolbar select{background:var(--panel2); color:var(--text);
    border:1px solid var(--border2); border-radius:8px; padding:6px 10px;
    font-family:'JetBrains Mono',monospace; font-size:12.5px; cursor:pointer; max-width:360px;
    transition:border-color .15s;}
  #toolbar select:hover{border-color:var(--astra);}
  #session-meta{margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted);}

  /* ---------- transcript ---------- */
  #transcript{position:relative; z-index:3; max-width:1080px; margin:0 auto; padding:26px 20px 96px;}
  .placeholder{color:var(--muted); padding:56px 20px; text-align:center; font-size:15px;}
  .placeholder.err{color:var(--bad);}
  .placeholder code{font-family:'JetBrains Mono',monospace; color:var(--gold); font-size:13px;}

  .run-summary{display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    padding:0 4px 18px; border-bottom:1px solid var(--border); margin-bottom:20px;}
  .rs-title{font-size:20px; font-weight:700; letter-spacing:-.2px;}
  .rs-title .rs-dim{color:var(--dim); font-weight:400; margin:0 2px;}
  .rs-meta{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted);}
  .rs-meta .rs-fail{color:var(--bad); font-weight:700;}
  .rs-actions{margin-left:auto; display:flex; gap:8px;}
  .btnx{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted);
    background:var(--panel2); border:1px solid var(--border2); border-radius:8px;
    padding:6px 11px; cursor:pointer; transition:all .15s;}
  .btnx:hover{color:var(--text); border-color:var(--astra); box-shadow:0 0 12px rgba(124,140,248,.25);}

  /* ---------- agent-call cards ---------- */
  details.call{border:1px solid var(--border); border-radius:12px; margin:0 0 14px; overflow:hidden;
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    box-shadow:0 10px 30px rgba(0,0,0,.28);}
  details.call.fail{border-color:rgba(248,113,113,.42);}
  details.call[open]{box-shadow:0 14px 40px rgba(0,0,0,.4);}
  .call-head{list-style:none; cursor:pointer; user-select:none;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:13px 16px;}
  .call-head::-webkit-details-marker{display:none;}
  details.call[open] .call-head{border-bottom:1px solid var(--border);}
  .call-head .caret{color:var(--dim); font-size:11px; transition:transform .18s; width:10px;}
  details.call[open] .call-head .caret{transform:rotate(90deg);}
  .call-head .idx{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); min-width:26px;}
  .call-head .agent{font-weight:700; font-size:14px; padding:2px 10px; border-radius:8px;
    border:1px solid currentColor; background:rgba(255,255,255,.04);}
  .call-head .method{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--teal);}
  .call-head .ts{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--dim); margin-left:auto;}
  .call-head .dur{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--gold);}
  .badge{font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:700; letter-spacing:.4px;
    padding:2px 9px; border-radius:999px; text-transform:uppercase;}
  .badge.good{color:var(--good); background:rgba(52,211,153,.14); border:1px solid rgba(52,211,153,.45);}
  .badge.bad {color:var(--bad);  background:rgba(248,113,113,.14); border:1px solid rgba(248,113,113,.5);}

  .call-body{padding:10px 16px 16px;}
  details.sec{border:1px solid var(--border); border-radius:9px; margin:9px 0; background:rgba(255,255,255,.015);}
  details.sec>summary{list-style:none; cursor:pointer; user-select:none;
    padding:9px 13px; font-weight:600; font-size:13px; color:var(--muted);
    display:flex; align-items:center; gap:8px;}
  details.sec>summary::-webkit-details-marker{display:none;}
  details.sec>summary::before{content:"\25B8"; color:var(--dim); font-size:11px; transition:transform .18s;}
  details.sec[open]>summary::before{transform:rotate(90deg);}
  details.sec>summary:hover{color:var(--text);}
  details.sec-err>summary{color:var(--bad);}
  .cbadge{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim);
    border:1px solid var(--border2); border-radius:6px; padding:1px 6px;}
  .scroll{max-height:480px; overflow:auto; padding:12px 15px; border-top:1px solid var(--border);}

  /* content boxes */
  .mdbox{font-size:14.2px; line-height:1.6; color:var(--text); word-break:break-word;}
  .mdbox h1,.mdbox h2,.mdbox h3,.mdbox h4{color:#e2e8ff; line-height:1.3; margin:.9em 0 .4em;}
  .mdbox h1{font-size:1.35em;} .mdbox h2{font-size:1.2em;} .mdbox h3{font-size:1.08em;}
  .mdbox p{margin:.5em 0;} .mdbox ul,.mdbox ol{margin:.5em 0; padding-left:1.4em;}
  .mdbox li{margin:.2em 0;} .mdbox a{color:var(--astra);}
  .mdbox code{font-family:'JetBrains Mono',monospace; font-size:.88em;
    background:rgba(124,140,248,.12); padding:1px 5px; border-radius:5px;}
  .mdbox pre{background:#080b14; border:1px solid var(--border); border-radius:8px; padding:10px 12px; overflow:auto;}
  .mdbox pre code{background:none; padding:0;}
  .mdbox blockquote{border-left:3px solid var(--border2); margin:.6em 0; padding:.1em 0 .1em 12px; color:var(--muted);}
  .mdbox table{border-collapse:collapse; margin:.6em 0; font-size:.92em;}
  .mdbox th,.mdbox td{border:1px solid var(--border); padding:5px 9px; text-align:left;}
  .mdbox hr{border:none; border-top:1px solid var(--border); margin:1em 0;}

  pre.json,pre.raw{margin:0; font-family:'JetBrains Mono',monospace; font-size:12.4px; line-height:1.55;
    white-space:pre-wrap; word-break:break-word; color:var(--text);}
  pre.raw.err{color:var(--bad);}
  .tok-key{color:var(--j-key);} .tok-string{color:var(--j-str);} .tok-number{color:var(--j-num);}
  .tok-bool{color:var(--j-bool);} .tok-null{color:var(--j-bool);}

  /* ---------- responsive ---------- */
  @media (max-width:820px){
    .nav{padding:12px 16px;} .menu a{font-size:13px; padding:7px 9px;}
    #toolbar{padding:12px 14px; gap:12px;} #session-meta{margin-left:0; width:100%;}
    #toolbar select{max-width:60vw;}
    .call-head .ts{margin-left:0;}
  }
  @media (prefers-reduced-motion:reduce){ .stars,.stars2,.glow{animation:none !important;} }
</style>
</head>
<body>

  <div class="sky" aria-hidden="true">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
    <div class="stars"></div>
    <div class="stars stars2"></div>
  </div>

  <!-- ===== Top navigation ===== -->
  <header class="nav">
    <a class="brand" href="../index.html" aria-label="ASTRA home">
      <img src="../demo/imgs/astra_logo.png" alt="ASTRA">
    </a>
    <nav class="menu">
      <a href="../index.html">Home</a>
      <a href="../pathway_explorer/">Pathway Explorer</a>
      <a href="#" class="active" aria-current="page">Agent Logs</a>
      <a class="cta" href="../demo/index.html">Demo</a>
    </nav>
  </header>

  <!-- ===== Selector toolbar ===== -->
  <div id="toolbar">
    <span id="page-title">Agent Logs</span>
    <div class="toolbar-sep"></div>
    <div class="select-group"><span class="select-label">Molecule</span><select id="sel-molecule"></select></div>
    <div class="select-group"><span class="select-label">Model</span><select id="sel-model"></select></div>
    <div class="select-group"><span class="select-label">Config</span><select id="sel-config"></select></div>
    <div class="select-group"><span class="select-label">Session</span><select id="sel-session"></select></div>
    <div id="session-meta"></div>
  </div>

  <!-- ===== Transcript ===== -->
  <main id="transcript"><div class="placeholder">Loading index…</div></main>

  <script>
  (function () {
    'use strict';

    var MANIFEST = [];

    var MODEL_LABELS = {
      'claude_opus4.6': 'Claude Opus 4.6',
      'gpt4.1': 'GPT 4.1',
      'gpt5.4': 'GPT 5.4'
    };
    var CONFIG_LABELS = {
      'deep_research_claude': 'Deep Research (Claude)',
      'deep_research_gemini': 'Deep Research (Gemini)',
      'deep_research_gpt5.4': 'Deep Research (GPT 5.4)',
      'no_research': 'No Research',
      'perfect_rag': 'Perfect RAG'
      // ms_disc intentionally omitted
    };
    // Accent color per agent (used for the header badge).
    var AGENT_COLOR = {
      'SynthesisNetworkAgent': 'var(--astra)',
      'CriticAgent': 'var(--gold)',
      'AstroDeepResearchAgent': 'var(--teal)',
      'PerfectRAG': '#22C55E'
    };

    function $(id){ return document.getElementById(id); }
    function val(id){ return $(id).value; }

    // ---------- helpers ----------
    function escapeHtml(s){
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    // Escape for HTML text content but keep quotes (so the JSON tokenizer can see string delimiters).
    function escapeKeepQuotes(s){
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmtDuration(ms){
      if (ms == null || isNaN(ms)) return '';
      if (ms >= 60000){ var m = Math.floor(ms/60000), s = Math.round((ms%60000)/1000); return m + 'm ' + s + 's'; }
      if (ms >= 1000)  return (ms/1000).toFixed(1) + 's';
      return Math.round(ms) + 'ms';
    }
    function fmtTs(ts){                       // ISO 2026-03-19T16:41:09.528 -> 2026-03-19 16:41:09
      if (!ts) return '';
      return String(ts).replace('T',' ').replace(/\.\d+.*$/,'');
    }
    function prettyTs(ts){                    // 20260319_164109 -> 2026-03-19 16:41:09
      return ts.replace(/^(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})$/, '$1-$2-$3 $4:$5:$6');
    }
    function charBadge(s){
      if (!s) return '';
      return ' <span class="cbadge">' + s.length.toLocaleString() + ' ch</span>';
    }
    function highlightJson(obj){
      var json;
      try { json = JSON.stringify(obj, null, 2); }
      catch (e){ return escapeHtml(String(obj)); }
      json = escapeKeepQuotes(json);
      return json.replace(
        /("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(?:true|false)\b|\bnull\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        function (m){
          var cls = 'tok-number';
          if (m.charAt(0) === '"') cls = /:\s*$/.test(m) ? 'tok-key' : 'tok-string';
          else if (m === 'true' || m === 'false') cls = 'tok-bool';
          else if (m === 'null') cls = 'tok-null';
          return '<span class="' + cls + '">' + m + '</span>';
        });
    }
    function hasMarked(){ return typeof marked !== 'undefined' && marked && typeof marked.parse === 'function'; }

    // ---------- content box builders ----------
    function textPre(s, isErr){
      var p = document.createElement('pre');
      p.className = 'raw' + (isErr ? ' err' : '');
      p.textContent = s;
      return p;
    }
    function mdBox(s){
      var w = document.createElement('div'); w.className = 'mdbox scroll';
      if (hasMarked()){
        try { w.innerHTML = marked.parse(String(s)); return w; } catch (e){ /* fall through */ }
      }
      w.appendChild(textPre(String(s)));
      return w;
    }
    function jsonBox(obj){
      var w = document.createElement('div'); w.className = 'jsonbox scroll';
      var pre = document.createElement('pre'); pre.className = 'json';
      pre.innerHTML = highlightJson(obj);
      w.appendChild(pre);
      return w;
    }
    // raw_response is often a JSON string; sometimes prose/markdown; sometimes a "Running tool:" preamble.
    function rawBox(s){
      var body = String(s);
      var m = /^\s*Running tool:[^\n]*\n?/.exec(body);
      if (m) body = body.slice(m[0].length);
      var t = body.trim();
      if (t && (t.charAt(0) === '{' || t.charAt(0) === '[')){
        try { return jsonBox(JSON.parse(t)); } catch (e){ /* not valid JSON — render as text/markdown */ }
      }
      return mdBox(body);
    }
    function section(titleHtml, kind, contentEl, open){
      var d = document.createElement('details'); d.className = 'sec sec-' + kind;
      if (open) d.open = true;
      var sm = document.createElement('summary'); sm.innerHTML = titleHtml;
      d.appendChild(sm); d.appendChild(contentEl);
      return d;
    }

    // ---------- manifest ----------
    function loadManifest(){
      return fetch('logs_index.json')
        .then(function (r){ if (!r.ok) throw new Error('logs_index.json ' + r.status); return r.json(); })
        .then(function (j){
          MANIFEST = (j.sessions || []).filter(function (s){
            return s.config !== 'ms_disc' && s.path.indexOf('_ms_disc_') === -1; // defensive re-filter
          });
        });
    }

    // ---------- cascading dropdowns ----------
    function distinct(rows, key){
      var seen = {}, out = [];
      rows.forEach(function (r){ if (!seen[r[key]]){ seen[r[key]] = 1; out.push(r[key]); } });
      return out;
    }
    function fill(sel, values, labeler){
      sel.innerHTML = '';
      values.forEach(function (v){
        var o = document.createElement('option');
        o.value = v; o.textContent = labeler ? labeler(v) : v;
        sel.appendChild(o);
      });
    }
    function rowsFor(f){
      return MANIFEST.filter(function (r){
        return (f.molecule == null || r.molecule === f.molecule)
            && (f.model    == null || r.model    === f.model)
            && (f.config   == null || r.config   === f.config);
      });
    }
    function populateMolecule(){
      fill($('sel-molecule'), distinct(MANIFEST, 'molecule').sort(), null);
    }
    function populateModel(mol){
      fill($('sel-model'), distinct(rowsFor({molecule: mol}), 'model'),
           function (v){ return MODEL_LABELS[v] || v; });
    }
    function populateConfig(mol, model){
      fill($('sel-config'), distinct(rowsFor({molecule: mol, model: model}), 'config').sort(),
           function (v){ return CONFIG_LABELS[v] || v; });
    }
    function populateSession(mol, model, cfg){
      var rows = rowsFor({molecule: mol, model: model, config: cfg}).slice()
        .sort(function (a, b){ return a.session < b.session ? 1 : -1; }); // newest first
      fill($('sel-session'), rows.map(function (r){ return r.session; }), function (ts){
        var r = rows.filter(function (x){ return x.session === ts; })[0];
        return prettyTs(ts) + ' · ' + r.records + ' calls' + (r.run > 1 ? ' · run ' + r.run : '');
      });
    }

    function onMolecule(){ populateModel(val('sel-molecule')); onModel(); }
    function onModel(){ populateConfig(val('sel-molecule'), val('sel-model')); onConfig(); }
    function onConfig(){ populateSession(val('sel-molecule'), val('sel-model'), val('sel-config')); onSession(); }
    function onSession(){ loadSelected(); }

    function findRow(){
      var mol = val('sel-molecule'), model = val('sel-model'), cfg = val('sel-config'), ses = val('sel-session');
      for (var i = 0; i < MANIFEST.length; i++){
        var r = MANIFEST[i];
        if (r.molecule === mol && r.model === model && r.config === cfg && r.session === ses) return r;
      }
      return null;
    }

    // ---------- load + render a single run ----------
    function loadSelected(){
      var row = findRow();
      if (!row){ return; }
      writeHash(row);
      $('transcript').innerHTML = '<div class="placeholder">Loading <code>' + escapeHtml(row.path) + '</code> …</div>';
      $('session-meta').textContent = '';
      fetch(row.path)
        .then(function (r){ if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(function (text){ renderTranscript(text, row); })
        .catch(function (e){
          $('transcript').innerHTML = '<div class="placeholder err">Failed to load log ('
            + escapeHtml(String(e.message)) + ').</div>';
        });
    }

    function parseJsonl(text){
      var recs = [], errs = 0;
      var lines = text.split(/\r?\n/);
      for (var i = 0; i < lines.length; i++){
        var t = lines[i].trim();
        if (!t) continue;
        if (t.charAt(0) === '#') continue;         // "# IOLogger" header / stray comments
        try { recs.push(JSON.parse(t)); }
        catch (e){ errs++; recs.push({ __parseError: true, __raw: lines[i] }); }
      }
      return { recs: recs, errs: errs };
    }

    function renderTranscript(text, row){
      var p = parseJsonl(text);
      var totalMs = 0, fails = 0;
      p.recs.forEach(function (r){
        if (!r.__parseError && typeof r.duration_ms === 'number') totalMs += r.duration_ms;
        if (r.success === false) fails++;
      });

      var host = $('transcript'); host.innerHTML = '';

      var head = document.createElement('div'); head.className = 'run-summary';
      head.innerHTML =
        '<div class="rs-title">' + escapeHtml(row.molecule) +
          ' <span class="rs-dim">/</span> ' + escapeHtml(MODEL_LABELS[row.model] || row.model) +
          ' <span class="rs-dim">/</span> ' + escapeHtml(CONFIG_LABELS[row.config] || row.config) + '</div>' +
        '<div class="rs-meta">' + p.recs.length + ' agent calls · ' + fmtDuration(totalMs) + ' total' +
          (fails ? ' · <span class="rs-fail">' + fails + ' failed</span>' : '') +
          (p.errs ? ' · ' + p.errs + ' parse error(s)' : '') + '</div>' +
        '<div class="rs-actions">' +
          '<button class="btnx" id="expand-all">Expand all</button>' +
          '<button class="btnx" id="collapse-all">Collapse all</button></div>';
      host.appendChild(head);

      p.recs.forEach(function (rec, i){ host.appendChild(renderCard(rec, i)); });

      $('expand-all').onclick = function (){
        [].forEach.call(host.querySelectorAll('details.call'), function (d){ d.open = true; });
      };
      $('collapse-all').onclick = function (){
        [].forEach.call(host.querySelectorAll('details.call'), function (d){ d.open = false; });
      };

      $('session-meta').textContent = p.recs.length + ' calls · ' + fmtDuration(totalMs) +
        (fails ? ' · ' + fails + ' failed' : '');
    }

    function renderCard(rec, i){
      var card = document.createElement('details'); card.className = 'call';
      if (i === 0) card.open = true;             // show the first call by default

      if (rec.__parseError){
        card.className = 'call fail';
        var s0 = document.createElement('summary'); s0.className = 'call-head';
        s0.innerHTML = '<span class="caret">▸</span><span class="idx">#' + (i + 1) +
          '</span><span class="badge bad">parse error</span>';
        card.appendChild(s0);
        var body0 = document.createElement('div'); body0.className = 'call-body';
        body0.appendChild(textPre(rec.__raw, true));
        card.appendChild(body0);
        return card;
      }

      var ok = rec.success !== false;
      if (!ok) card.className = 'call fail';
      var color = AGENT_COLOR[rec.agent_name] || 'var(--muted)';

      var sm = document.createElement('summary'); sm.className = 'call-head';
      sm.innerHTML =
        '<span class="caret">▸</span>' +
        '<span class="idx">#' + (i + 1) + '</span>' +
        '<span class="agent" style="color:' + color + '">' + escapeHtml(rec.agent_name || '?') + '</span>' +
        '<span class="method">' + escapeHtml(rec.method_name || '') + '</span>' +
        '<span class="ts">' + escapeHtml(fmtTs(rec.timestamp)) + '</span>' +
        '<span class="dur">' + fmtDuration(rec.duration_ms) + '</span>' +
        '<span class="badge ' + (ok ? 'good' : 'bad') + '">' + (ok ? 'success' : 'fail') + '</span>';
      card.appendChild(sm);

      var body = document.createElement('div'); body.className = 'call-body';
      if (rec.error_message)
        body.appendChild(section('Error', 'err', textPre(String(rec.error_message), true), true));
      if (rec.system_message)
        body.appendChild(section('System message' + charBadge(rec.system_message), 'md', mdBox(rec.system_message), false));
      if (rec.user_message)
        body.appendChild(section('User message' + charBadge(rec.user_message), 'md', mdBox(rec.user_message), false));
      if (rec.raw_response)
        body.appendChild(section('Raw response' + charBadge(rec.raw_response), 'raw', rawBox(rec.raw_response), false));
      if (rec.parsed_response != null)
        body.appendChild(section('Parsed response', 'json', jsonBox(rec.parsed_response), true));
      card.appendChild(body);
      return card;
    }

    // ---------- deep-linking via URL hash ----------
    function enc(s){ return encodeURIComponent(s); }
    function writeHash(row){
      var h = '#molecule=' + enc(row.molecule) + '&model=' + enc(row.model) +
              '&config=' + enc(row.config) + '&session=' + enc(row.session);
      if (h !== location.hash) history.replaceState(null, '', h);
    }
    function parseHash(){
      var o = {};
      location.hash.replace(/^#/, '').split('&').forEach(function (kv){
        var p = kv.split('='); if (p[0]) o[p[0]] = decodeURIComponent(p[1] || '');
      });
      return o;
    }
    function setVal(id, v){
      var s = $(id);
      var ok = [].some.call(s.options, function (o){ return o.value === v; });
      if (ok) s.value = v;
      return ok;
    }
    function restoreFromHash(){
      var h = parseHash();
      if (!h.molecule) return false;
      var match = MANIFEST.filter(function (r){
        return r.molecule === h.molecule && r.model === h.model &&
               r.config === h.config && r.session === h.session;
      })[0];
      if (!match) return false;
      populateMolecule();                 if (!setVal('sel-molecule', h.molecule)) return false;
      populateModel(h.molecule);          if (!setVal('sel-model', h.model)) return false;
      populateConfig(h.molecule, h.model);if (!setVal('sel-config', h.config)) return false;
      populateSession(h.molecule, h.model, h.config); if (!setVal('sel-session', h.session)) return false;
      loadSelected();
      return true;
    }

    // ---------- init ----------
    function init(){
      loadManifest().then(function (){
        if (!MANIFEST.length){
          $('transcript').innerHTML = '<div class="placeholder">No agent logs found in the index.</div>';
          return;
        }
        populateMolecule();
        $('sel-molecule').addEventListener('change', onMolecule);
        $('sel-model').addEventListener('change', onModel);
        $('sel-config').addEventListener('change', onConfig);
        $('sel-session').addEventListener('change', onSession);
        window.addEventListener('hashchange', function (){ restoreFromHash(); });
        if (!restoreFromHash()) onMolecule();   // cascade + auto-load the first available run
      }).catch(function (e){
        $('transcript').innerHTML = '<div class="placeholder err">Could not load <code>logs_index.json</code> ('
          + escapeHtml(String(e.message)) + '). Run <code>python3 build_index.py</code> from the <code>agents_logs/</code> folder.</div>';
      });
    }
    document.addEventListener('DOMContentLoaded', init);
  })();
  </script>

</body>
